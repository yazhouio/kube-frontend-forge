name: Docker Image

on:
  pull_request:
  release:
    types:
      - published

env:
  IMAGE_NAME: spike2044/frontend-forge-server

jobs:
  build-pr-image:
    name: Build PR image
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure private npm registry auth
        run: |
          if [ -n "${NPM_AUTH_BASE64:-}" ]; then
            printf '\n//internal-registry.npm.kubesphere.com.cn/:_auth=%s\n' "${NPM_AUTH_BASE64}" >> .npmrc
          fi
        env:
          NPM_AUTH_BASE64: ${{ secrets.NPM_AUTH_BASE64 }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}

  build-release-image:
    name: Build and push release image
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure private npm registry auth
        run: |
          if [ -n "${NPM_AUTH_BASE64:-}" ]; then
            printf '\n//internal-registry.npm.kubesphere.com.cn/:_auth=%s\n' "${NPM_AUTH_BASE64}" >> .npmrc
          fi
        env:
          NPM_AUTH_BASE64: ${{ secrets.NPM_AUTH_BASE64 }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
